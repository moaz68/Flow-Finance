<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Moaz Project</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../assets/css/admin.css"></head>
<body>

<div class="network-flow">
  <div class="data-line"></div>
  <div class="data-line"></div>
  <div class="data-line"></div>
</div>

<aside class="sidebar">
  <div class="brand">
    <i class="fa-solid fa-shield-halved"></i>
    Admin Panel
  </div>
  
  <nav>
    <a class="nav-item active"><i class="fa-solid fa-users"></i> Users Control</a>
    <a class="nav-item"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
    <a class="nav-item"><i class="fa-solid fa-sliders"></i> System Settings</a>
    <a class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i> Security Logs</a>
  </nav>
</aside>

<main class="main-content">
  <header>
    <h2>Welcome Admin <span class="crown-3d">👑</span></h2>
    <a href="pro.html" class="logout-btn">Logout</a>
  </header>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-icon icon-blue"><i class="fa-solid fa-users"></i></div>
      <div class="stat-info">
        <h4>Total Users</h4>
        <div id="totalUsersCount">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon icon-green"><i class="fa-solid fa-bolt"></i></div>
      <div class="stat-info">
        <h4>Active Subscriptions</h4>
        <div>84%</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon icon-purple"><i class="fa-solid fa-wallet"></i></div>
      <div class="stat-info">
        <h4>Total Transactions</h4>
        <div>$124.5k</div>
      </div>
    </div>
  </div>

  <div class="content-grid">
    <!-- Users Table Section -->
    <div class="glass-panel">
      <div class="panel-header">
        <div class="panel-title"><i class="fa-solid fa-user-shield" style="color:var(--accent-blue)"></i> Users Database</div>
        <div class="search-wrapper">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="search" class="search-input" placeholder="Search by name or email..." onkeyup="searchUsers()">
        </div>
      </div>
      
      <div style="margin-bottom: 15px;">
        <button onclick="loadUsers()" style="background: rgba(56, 189, 248, 0.2); border: 1px solid var(--accent-blue); color: var(--accent-blue); padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight:600;"><i class="fa-solid fa-rotate-right"></i> Refresh Data</button>
      </div>

      <div id="usersList" style="overflow-x: auto;">
        <!-- Table injected here via JS -->
      </div>
    </div>

    <!-- Theme Settings Section -->
    <div class="glass-panel theme-settings">
      <div class="panel-header">
        <div class="panel-title"><i class="fa-solid fa-palette" style="color:var(--accent-green)"></i> Theme Settings</div>
      </div>

      <div class="setting-group">
        <label>System Background Theme</label>
        <div class="color-picker-wrapper">
          <input type="color" id="color" class="color-input" value="#020617">
          <span style="font-size:13px; color:var(--text-main);">Select Color Base</span>
        </div>
      </div>

      <div class="setting-group">
        <label>Typography Preview</label>
        <select id="font" class="font-select">
          <option value="'Inter', sans-serif">Inter (Modern & Clean)</option>
          <option value="Arial, sans-serif">Arial (Standard)</option>
          <option value="'Courier New', monospace">Courier New (Monospace)</option>
        </select>
      </div>

      <button class="save-theme-btn" onclick="saveTheme()"><i class="fa-solid fa-check"></i> Apply Configuration</button>
    </div>
  </div>
</main>

<!-- Edit Modal -->
<div id="editModal" class="modal-overlay">
  <div class="modal-box">
    <h3><i class="fa-solid fa-user-pen" style="color:var(--accent-blue)"></i> Edit User Profile</h3>
    
    <input type="text" id="editName" class="modal-input" placeholder="Full Name">
    <input type="email" id="editEmail" class="modal-input" placeholder="Email Address" readonly style="opacity: 0.6; cursor: not-allowed; background: rgba(255,255,255,0.05);" title="Email cannot be edited">
    
    <select id="editRole" class="modal-input">
      <option value="user">Standard User</option>
      <option value="admin">Administrator</option>
    </select>

    <div class="block-action" style="margin-top: 15px; display: flex; align-items: center; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px;">
      <span style="color: var(--text-main); font-weight: 500;">Account Status</span>
      <button id="blockToggleBtn" onclick="toggleBlockStatus()" style="padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s;"></button>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div><script src="../assets/js/admin.js" defer></script>
</body>
</html>
