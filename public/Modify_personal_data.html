<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Settings — Profile</title>	<link rel="stylesheet" href="../assets/css/Modify_personal_data.css">
</head>
<body>

	<main class="settings-shell" role="main">
		<aside class="sidebar" aria-label="Settings navigation">
			<strong style="display:block;margin-bottom:8px">Settings</strong>
			<nav class="nav" role="tablist">
				<div class="tab active" role="tab" aria-selected="true" data-target="profile">Profile</div>
				<div class="tab" role="tab" aria-selected="false" data-target="security">Security</div>
			</nav>
		</aside>

		<section class="content">
			<div class="card" id="profile-panel" data-panel="profile">
				<div class="card-header">
					<div>
						<h2>Edit Profile</h2>
						<p class="lead">Update your display name and email address.</p>
					</div>
				</div>

				<form id="profile-form" novalidate>
					<div>
						<label for="name">Name</label>
						<input id="name" name="name" type="text" placeholder="Your name" autocomplete="name">
						<div class="error" id="name-error" aria-live="polite" style="display:none"></div>
					</div>

					<div>
						<label for="email">Email</label>
						<input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email">
						<div class="error" id="email-error" aria-live="polite" style="display:none"></div>
					</div>

					<div class="actions">
						<button type="button" class="save" id="save-btn">
							<span id="save-spinner" style="display:none" class="spinner" aria-hidden="true"></span>
							<span id="save-text">Save</span>
						</button>
						<div class="inline-msg" id="form-msg" aria-live="polite"></div>
					</div>
				</form>
			</div>

			<div class="card" id="security-panel" data-panel="security" style="display:none; opacity:0; transform:translateY(6px)">
				<div class="card-header">
					<div>
						<h2>Security</h2>
						<p class="lead">Placeholder — coming soon.</p>
					</div>
				</div>
				<div style="margin-top:14px; color:var(--muted)">Options to change password and two-factor auth will appear here.</div>
			</div>

		</section>
	</main>

	<div id="toast" class="toast" role="status" aria-live="polite"></div><script src="../assets/js/Modify_personal_data.js" defer></script>
</body>
</html>
