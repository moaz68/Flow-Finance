<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification | Fintech Pro</title>
    <!-- Absolute Root-Relative Path -->
    <link rel="stylesheet" href="../assets/css/check_email.css">
    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-wrapper">
        <div class="neon-glow"></div>
        
        <div class="glass-card">
            <div class="card-header">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                </div>
                <h1>Security Verification</h1>
                <p>Please enter the 6-digit security code sent to your inbox to authenticate your access.</p>
            </div>

            <div class="otp-grid" id="otp-inputs-container">
                <input type="text" maxlength="1" pattern="\d*" inputmode="numeric" autocomplete="one-time-code" data-index="1">
                <input type="text" maxlength="1" pattern="\d*" inputmode="numeric" data-index="2">
                <input type="text" maxlength="1" pattern="\d*" inputmode="numeric" data-index="3">
                <input type="text" maxlength="1" pattern="\d*" inputmode="numeric" data-index="4">
                <input type="text" maxlength="1" pattern="\d*" inputmode="numeric" data-index="5">
                <input type="text" maxlength="1" pattern="\d*" inputmode="numeric" data-index="6">
            </div>

            <div id="error-feedback" class="error-text"></div>

            <div class="action-zone">
                <button id="verify-action" class="btn-primary">
                    <span class="btn-text">Verify Identity</span>
                    <div class="spinner" id="btn-spinner"></div>
                </button>
            </div>

            <div class="card-footer">
                <p>Didn't receive the code? <button id="resend-trigger" class="btn-link">Resend Code <span id="countdown-timer">(60s)</span></button></p>
                <a href="./pro.html" class="nav-link">Return to Registration</a>
            </div>
        </div>
    </div>

    <!-- Success Animation Overlay -->
    <div id="success-mask" class="full-overlay">
        <div class="success-box">
            <div class="checkmark-circle">
                <svg class="checkmark-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                    <circle class="checkmark-circle-bg" cx="26" cy="26" r="25" fill="none"/>
                    <path class="checkmark-check-path" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                </svg>
            </div>
            <h2>Authenticated</h2>
            <p>Access granted. Redirecting to your workspace...</p>
        </div>
    </div>

    <!-- Absolute Root-Relative Path -->
    <script src="../assets/js/check_email.js" defer></script>
</body>
</html>
